name: Deploy front-end to GitHub Pages

on:
  push:
    branches:
      - main
      - dev_v1
      - 'release/**'

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    # Add permissions to allow the default GITHUB_TOKEN to write to the repository
    # This fixes the "Permission denied" error during git push.
    permissions:
      contents: write
      pages: write # optional, but good practice for GitHub Pages actions
      id-token: write # required if using OIDC to authenticate with a different service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20.19.5 (ensure >= 20.19)
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.5'
          cache: 'npm'
          cache-dependency-path: frontend/repute-frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f frontend/repute-frontend/package-lock.json ]; then
            echo "Found package-lock.json — running npm ci"
            npm ci
          else
            echo "No package-lock.json found — running npm install (consider committing a lockfile for reproducible builds)"
            npm install
          fi
        working-directory: frontend/repute-frontend

      - name: Build (production, relative base-href)
        # Assuming you have migrated to the 'application' builder, 
        # the output path will now be in dist/repute-frontend/browser
        run: npx ng build --configuration production --base-href ./
        working-directory: frontend/repute-frontend

      - name: Verify build output exists (Updated for latest Angular)
        # The key update: checking for the 'browser' sub-directory.
        run: |
          BUILD_PATH="frontend/repute-frontend/dist/repute-frontend/browser"
          echo "Checking build output folder: $BUILD_PATH"
          if [ -d "$BUILD_PATH" ]; then
            echo "Build output found. Listing contents:"
            ls -la "$BUILD_PATH"
          else
            echo "ERROR: build output not found at $BUILD_PATH"
            ls -la frontend/repute-frontend/dist/repute-frontend || true
            exit 1
          fi
      
      - name: Deploy to GitHub Pages (Updated publish_dir)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # KEY CHANGE: Append '/browser' to the publish_dir path
          publish_dir: ./frontend/repute-frontend/dist/repute-frontend/browser
          commit_message: 'chore(gh-pages): deploy from ${{ github.ref }}'