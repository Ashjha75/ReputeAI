# Common application configuration
spring:
  application:
    name: reputeai
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-version: 1
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

app:
  cookieName: TOKEN
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
    domain: ${COOKIE_DOMAIN:}
  # Map to what JwtProvider expects
  jwtSecret: ${APP_JWTSECRET:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}

springdoc:
  swagger-ui:
    path: /api/v1/docs
    use-root-path: true

logging:
  level:
    root: INFO
    com.reputeai: DEBUG
    org.springframework.security: TRACE
    com.giffing.bucket4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS} %-5level [%X{traceId:-}] %logger{36} - %msg%n"

# Bucket4j Rate Limiting Configuration
bucket4j:
  enabled: true
  cache-to-use: jcache
  filters:
    - cache-name: buckets
      url: /api/v1/auth/.*
      strategy: first
      http-response-body: '{"error": "TOO_MANY_REQUESTS", "message": "Rate limit exceeded. Please try again after 5 minutes."}'
      rate-limits:
        - execute-condition: "true"
          expression: "getRemoteAddr()"
          bandwidths:
            - capacity: 5
              time: 5
              unit: minutes
              refill-speed: interval