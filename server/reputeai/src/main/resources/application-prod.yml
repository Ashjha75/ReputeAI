# Common application configuration
spring:
  application:
    name: reputeai
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-version: 1
    baseline-on-migrate: true

  # OAuth2 client registrations (production)
  security:
    oauth2:
      client:
        registration:
          # Google OAuth2 - for user authentication
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,email,profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            client-name: Google
          # GitHub OAuth2 - for user authentication
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user,user:email
            redirect-uri: "{baseUrl}/login/oauth2/code/github"
            client-name: GitHub
          # Twitter OAuth2 - for platform account connection
          twitter:
            client-id: ${TWITTER_CLIENT_ID}
            client-secret: ${TWITTER_CLIENT_SECRET}
            scope: tweet.read,users.read,offline.access
            redirect-uri: "{baseUrl}/api/v1/platforms/callback/twitter"
            client-name: Twitter
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_basic
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: id
          twitter:
            authorization-uri: https://twitter.com/i/oauth2/authorize
            token-uri: https://api.twitter.com/2/oauth2/token
            user-info-uri: https://api.twitter.com/2/users/me
            user-name-attribute: id

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

app:
  cookieName: TOKEN
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
    domain: ${COOKIE_DOMAIN:}
  # Map to what JwtProvider expects
  jwtSecret: ${APP_JWTSECRET:}
  oauth2:
    redirect-uri: ${APP_OAUTH2_REDIRECT_URI:https://your-production-redirect.example.com/oauth2/redirect}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}

springdoc:
  swagger-ui:
    path: /api/v1/docs
    use-root-path: true

logging:
  level:
    root: INFO
    com.reputeai: DEBUG
    org.springframework.security: TRACE
    com.giffing.bucket4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS} %-5level [%X{traceId:-}] %logger{36} - %msg%n"

# Bucket4j Rate Limiting Configuration
bucket4j:
  enabled: true
  cache-to-use: jcache
  filters:
    - cache-name: buckets
      url: /api/v1/auth/.*
      strategy: first
      http-response-body: '{"error": "TOO_MANY_REQUESTS", "message": "Rate limit exceeded. Please try again after 5 minutes."}'
      rate-limits:
        - execute-condition: "true"
          expression: "getRemoteAddr()"
          bandwidths:
            - capacity: 5
              time: 5
              unit: minutes
              refill-speed: interval