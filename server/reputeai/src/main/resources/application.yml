# Common application configuration
spring:
  application:
    name: reputeai
  profiles:
    # default active profile kept as dev to match previous behavior
    active: dev
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-version: 1
    baseline-on-migrate: true

server:
  error:
    include-message: always

app:
  # common defaults; environment-specific values live in profile files
  cookieName: TOKEN

cors:
  allowed-origins:
    - http://localhost:4200
    - http://localhost:8080
    - https://ashjha75.github.io

springdoc:
  swagger-ui:
    path: /api/v1/docs
    use-root-path: true

logging:
  level:
    root: INFO
    com.reputeai: DEBUG
    org.springframework.security: TRACE
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS} %-5level [%X{traceId:-}] %logger{36} - %msg%n"

# Note: sensitive, environment-specific values (DB credentials, AWS keys, client secrets)
# are kept in profile files (application-dev.yml, application-prod.yml).
