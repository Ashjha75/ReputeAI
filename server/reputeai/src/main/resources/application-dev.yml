# Development profile - ALL values come from environment variables for Docker
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 3600000ms

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:not-configured}
            client-secret: ${GOOGLE_CLIENT_SECRET:not-configured}
            scope: openid,email,profile
            redirect-uri: {baseUrl}/login/oauth2/code/google
            client-name: Google
          github:
            client-id: ${GITHUB_CLIENT_ID:not-configured}
            client-secret: ${GITHUB_CLIENT_SECRET:not-configured}
            scope: read:user,user:email
            redirect-uri: {baseUrl}/login/oauth2/code/github
            client-name: GitHub
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: id

# JWT Configuration - Maps to JwtProvider constructor parameters
jwt:
  private-key: ${JWT_PRIVATE_KEY}
  public-key: ${JWT_PUBLIC_KEY}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  refresh-token:
    expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  reset-token:
    expiration-ms: ${JWT_RESET_EXPIRATION_MS:3600000}

# App Configuration
app:
  domain: ${APP_DOMAIN}
  jwtSecret: ${APP_JWTSECRET}
  cookieName: TOKEN
  oauth2:
    redirect-uri: ${APP_OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}

# AWS Configuration
aws:
  accessKeyId: ${AWS_ACCESS_KEY_ID}
  secretAccessKey: ${AWS_SECRET_ACCESS_KEY}
  region: ${AWS_REGION}
  s3:
    bucket: ${AWS_S3_BUCKET}
  ses:
    sender: ${AWS_SES_SENDER}

# External API
external:
  api:
    url: ${EXTERNAL_API_URL}