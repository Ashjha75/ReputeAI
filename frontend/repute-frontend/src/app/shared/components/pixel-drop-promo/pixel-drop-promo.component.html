<div class="promo-section">
  <div class="header-sticky-wrapper">
    <div class="header-content">
      <h2 class="section-title">The ReputeAI Advantage</h2>
      <p class="section-subtitle">Four layers of intelligent defense for your digital reputation.</p>
    </div>
  </div>

  <div class="cards-stack-container">
    <div class="card-wrapper" *ngFor="let card of cards; let i = index" [style.--index]="i">
      <div class="card" [ngClass]="card.colorClass">
        <div class="card-body">
          <div class="card-header">
            <div class="icon-box">
              <mat-icon>{{ card.icon }}</mat-icon>
            </div>
            <span class="card-number">0{{ i + 1 }}</span>
          </div>
          <h3 class="card-title">{{ card.title }}</h3>
          <p class="card-description">{{ card.description }}</p>
        </div>
        <div class="card-visual">
          <div class="visual-pattern"></div>
        </div>
      </div>
    </div>
  </div>
</div>
