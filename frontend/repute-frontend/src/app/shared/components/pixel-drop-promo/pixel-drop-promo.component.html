<div class="pixel-drop-promo-container">
  
  <!-- Left Column: Text Content (Updated for ReputeAI) -->
  <div class="pixel-drop-promo-content">
    <h2 class="pixel-drop-promo-title">Continuous Monitoring.<br>Constant Peace of Mind.</h2>
    <p class="pixel-drop-promo-desc">
      Every ReputeAI scan brings you new and improved insights,<br>
      including the latest AI-powered risk analysis.*
    </p>
    <button class="pixel-drop-promo-btn" (click)="openModal()">Explore Features</button>
  </div>

  <!-- Right Column: Abstract Graphic (Updated for ReputeAI) -->
  <div class="pixel-drop-promo-image-card">
    <div class="pixel-drop-promo-image-bg">
      <div class="pixel-drop-logo-mark">
        <img [src]="logo" alt="ReputeAI logo" loading="lazy" decoding="async" />
      </div>
      
      <div class="pixel-drop-video-wrapper">
        <video 
          class="pixel-drop-video"
          autoplay 
          muted 
          loop 
          playsinline
          [poster]="posterSrc"
        >
          <source [src]="videoSrc" type="video/mp4" />
        </video>
        <div class="pixel-drop-video-copy">
          <!-- <span class="video-deck">Demo loop</span> -->
          <!-- <h4>Pixel-area playback</h4> -->
          <!-- <p>Streamlined alerts &amp; visual cues run nonstop while the hero text explains the value.</p> -->
        </div>
      </div>

      <!-- Top Icon & Text -->
      <div class="absolute top-8 left-8 flex items-center gap-2">
        <!-- Replaced Paper Plane with Shield Icon -->
        <mat-icon class="text-gray-500">shield</mat-icon>
        <span class="text-sm font-medium text-gray-500">ReputeAI</span>
      </div>
      
      <!-- Main Abstract Text -->
      <div class="pixel-drop-logo-text">
        <!-- Replaced "Pixel Drop" with "AI Score" -->
        <div class="pixel-drop-headline">
          <span class="char">A</span>
          <span class="char">I</span>
          <span class="spacer">&nbsp;</span>
          <span class="char">S</span>
          <span class="char">c</span>
          <span class="char">o</span>
          <span class="char">r</span>
          <span class="char">e</span>
        </div>

        <!-- Smiley/check badge element -->
        <div class="pixel-drop-logo-smiley">
          <div class="smiley-face" aria-hidden="true">
            <div class="mouth"></div>
          </div>
          <div class="smiley-badge"><mat-icon>check</mat-icon></div>
        </div>
      </div>
    </div>
  </div>

</div>

<app-feature-modal
  [badgeLabel]="modalContent.badgeLabel"
  [badgeContext]="modalContent.badgeContext"
  [title]="modalContent.title"
  [subtitle]="modalContent.subtitle"
  [description]="modalContent.description"
  [mediaSrc]="modalContent.mediaSrc"
  [mediaAlt]="modalContent.mediaAlt"
  [showCta]="false"
  [showMediaControl]="false"
></app-feature-modal>
