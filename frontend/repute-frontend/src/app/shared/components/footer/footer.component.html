<footer class="footer">
  <div class="footer-container">
    
    <!-- Top Section: Follow us + Social Icons -->
    <div class="footer-social-section">
      <span class="follow-text">Follow us</span>
      <div class="social-icons">
        <a *ngFor="let social of socialLinks"
           [href]="social.url"
           target="_blank"
           rel="noopener noreferrer"
           [attr.aria-label]="social.label"
           class="social-link"
           [innerHTML]="social.svg">
        </a>
      </div>
    </div>

    <!-- Main Content: Footer Columns -->
    <div class="footer-columns">
      <div *ngFor="let section of footerSections" class="footer-column">
        <h3 class="column-title">{{ section.title }}</h3>
        <ul class="column-links">
          <li *ngFor="let link of section.links">
            <a [href]="link.url" 
               class="footer-link"
               [class.external]="link.external"
               [target]="link.external ? '_blank' : '_self'">
              {{ link.label }}
              <svg *ngIf="link.external" width="12" height="12" viewBox="0 0 16 16" fill="currentColor" class="external-icon">
                <path d="M9 2L9 3.5L12.5 3.5L6 10L7 11L13.5 4.5L13.5 8L15 8L15 2L9 2Z"/>
              </svg>
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- Bottom Section: Legal Links & Copyright -->
    <div class="footer-bottom">
      <div class="footer-bottom-content">
        <p class="footer-note">{{ footerNote }}</p>
        <div class="footer-legal">
          <a href="/privacy" class="legal-link">Privacy Policy</a>
          <span class="dot">•</span>
          <button class="language-selector">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
            </svg>
            English (India)
          </button>
        </div>
      </div>
    </div>

  </div>
</footer>
