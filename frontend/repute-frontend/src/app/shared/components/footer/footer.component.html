<footer class="footer">
  <div class="max-w-7xl mx-auto px-6 sm:px-8 lg:px-12">
    
    <!-- Social Links at Top -->
    <div class="border-b border-gray-700 pb-6 mb-8">
      <div class="flex items-center justify-start gap-3">
        <span class="text-gray-400 text-sm font-medium">Follow us</span>
        <a *ngFor="let social of socialLinks"
           [href]="social.url"
           target="_blank"
           rel="noopener noreferrer"
           [attr.aria-label]="social.label"
           class="social-icon w-10 h-10 rounded-full bg-gray-800 hover:bg-gray-700 flex items-center justify-center transition-all duration-200"
           [innerHTML]="social.svg">
        </a>
      </div>
    </div>

    <!-- Main Footer Content -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-8 mb-10">
      <!-- Footer Sections -->
      <div *ngFor="let section of footerSections" class="col-span-1">
        <h3 class="text-white font-semibold mb-4 text-sm">{{ section.title }}</h3>
        <ul class="space-y-2.5">
          <li *ngFor="let link of section.links">
            <a *ngIf="link.route" 
               [routerLink]="link.route"
               class="text-gray-400 hover:text-white text-sm transition-colors duration-200 flex items-center gap-1">
              {{ link.label }}
              <span *ngIf="link.external" class="text-xs">↗</span>
            </a>
            <a *ngIf="link.external" 
               [href]="link.external"
               target="_blank"
               rel="noopener noreferrer"
               class="text-gray-400 hover:text-white text-sm transition-colors duration-200 flex items-center gap-1">
              {{ link.label }}
              <span class="text-xs">↗</span>
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="border-t border-gray-700 pt-6 pb-8">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-gray-400">
        <p>© {{ currentYear }} ReputeAI. All rights reserved.</p>
        <div class="flex items-center gap-4">
          <a href="/privacy" class="hover:text-white transition-colors">Privacy Policy</a>
          <span>•</span>
          <a href="/terms" class="hover:text-white transition-colors">Terms</a>
        </div>
      </div>
    </div>

  </div>
</footer>
