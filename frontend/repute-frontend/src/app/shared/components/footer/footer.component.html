<footer class="footer">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    
    <!-- Main Footer Content -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-8">
      
      <!-- Brand Section -->
      <div class="col-span-1">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-10 h-10 bg-gradient-to-br from-black to-black rounded-xl flex items-center justify-center">
            <span class="text-white font-bold text-xl">R</span>
          </div>
          <span class="text-xl font-bold text-gray-900">ReputeAI</span>
        </div>
        <p class="text-gray-600 text-sm leading-relaxed">
          AI-powered reputation management for the modern digital age.
        </p>
      </div>

      <!-- Footer Links -->
      <div *ngFor="let section of footerSections" class="col-span-1">
        <h3 class="text-gray-900 font-semibold mb-4 text-sm">{{ section.title }}</h3>
        <ul class="space-y-3">
          <li *ngFor="let link of section.links">
            <a *ngIf="link.route" 
               [routerLink]="link.route"
               class="text-gray-600 hover:text-black text-sm transition-colors duration-200">
              {{ link.label }}
            </a>
            <a *ngIf="link.external" 
               [href]="link.external"
               target="_blank"
               rel="noopener noreferrer"
               class="text-gray-600 hover:text-black text-sm transition-colors duration-200">
              {{ link.label }}
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- Divider -->
    <div class="border-t border-gray-200 pt-8">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        
        <!-- Copyright -->
        <p class="text-gray-500 text-sm">
          © {{ currentYear }} ReputeAI. All rights reserved.
        </p>

        <!-- Social Links -->
        <div class="flex items-center gap-4">
          <span class="text-gray-500 text-sm mr-2">Follow us</span>
          <a *ngFor="let social of socialLinks" 
             [href]="social.url"
             target="_blank"
             rel="noopener noreferrer"
             [attr.aria-label]="social.label"
             class="social-icon w-9 h-9 rounded-full bg-gray-100 hover:bg-black flex items-center justify-center transition-all duration-300 group">
            <mat-icon class="text-gray-600 group-hover:text-white text-xl transition-colors duration-300">
              {{ social.icon }}
            </mat-icon>
          </a>
        </div>
      </div>
    </div>

  </div>
</footer>
