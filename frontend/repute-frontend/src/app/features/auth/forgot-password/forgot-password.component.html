<div class="auth-container min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full">
    
    <!-- Logo/Brand -->
    <div class="text-center mb-8">
      <div class="mb-4">
        <mat-icon class="text-indigo-600 text-6xl">lock_reset</mat-icon>
      </div>
      <h1 class="text-4xl font-bold text-gray-900 mb-2">Forgot Password?</h1>
      <p class="text-gray-600">No worries, we'll send you reset instructions</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-3xl shadow-xl p-10">
      
      <!-- Success Message -->
      <div *ngIf="emailSent" class="text-center space-y-5">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto">
          <mat-icon class="text-green-600 text-5xl">check_circle</mat-icon>
        </div>
        <h3 class="text-2xl font-bold text-gray-900">Check Your Email</h3>
        <p class="text-gray-600 leading-relaxed">
          We've sent password reset instructions to <br>
          <span class="font-semibold text-indigo-600">{{ email?.value }}</span>
        </p>
        <button 
          routerLink="/auth/login"
          class="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-medium hover:bg-indigo-700 transition-all duration-200 flex items-center justify-center gap-2 shadow-sm hover:shadow-md">
          Back to Login
        </button>
      </div>

      <!-- Form -->
      <form *ngIf="!emailSent" [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <!-- Email Field -->
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="you@example.com">
          <mat-icon matPrefix class="text-gray-500">mail_outline</mat-icon>
          <mat-error *ngIf="email?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="email?.hasError('email')">Invalid email format</mat-error>
        </mat-form-field>

        <!-- Submit Button -->
        <button 
          type="submit" 
          [disabled]="!forgotPasswordForm.valid || isLoading"
          class="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-medium hover:bg-indigo-700 transition-all duration-200 disabled:bg-gray-400 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-sm hover:shadow-md">
          <span *ngIf="!isLoading">Send Reset Link</span>
          <span *ngIf="isLoading">Sending...</span>
          <svg *ngIf="isLoading" class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>

        <!-- Back Link -->
        <div class="text-center mt-4">
          <a routerLink="/auth/login" class="text-indigo-600 hover:text-indigo-700 transition-colors duration-200 flex items-center justify-center gap-1 font-medium">
            <mat-icon>arrow_back</mat-icon>
            <span>Back to Login</span>
          </a>
        </div>
      </form>

    </div>
  </div>
</div>
