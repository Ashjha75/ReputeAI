<section class="features-carousel-section bg-gray-50">
  <div class="carousel-container max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    
    <!-- Carousel Content Grid: two equal columns, responsive -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-center min-h-[70vh]">
      
      <!-- Left Side: Image container -->
      <div class="image-container relative h-96 lg:h-[500px]">
        <div *ngFor="let feature of features; let i = index">
          <img *ngIf="i === currentSlide" 
               [@fadeAnimation] 
               [src]="feature.image" 
               [alt]="feature.title" 
               class="absolute inset-0 w-full h-full object-contain rounded-3xl">
        </div>
      </div>

      <!-- Right Side: Text Content -->
      <div class="text-container relative overflow-hidden">
        <div *ngFor="let feature of features; let i = index">
          <div *ngIf="i === currentSlide" 
               [@slideAnimation]="currentSlide" 
               class="content-card space-y-6">
            
            <!-- Progress Indicators -->
            <div class="progress-bars flex gap-2">
              <div *ngFor="let f of features; let idx = index"
                   (click)="goToSlide(idx)"
                   class="progress-bar h-1 rounded-full cursor-pointer transition-all duration-500"
                   [class.bg-gray-900]="idx === currentSlide"
                   [class.bg-gray-300]="idx !== currentSlide"
                   [class.w-12]="idx === currentSlide"
                   [class.w-4]="idx !== currentSlide">
              </div>
            </div>

            <!-- Title -->
            <h3 class="mat-headline-large font-bold text-gray-900">
              {{ feature.title }}
            </h3>

            <!-- Description -->
            <p class="mat-body-large text-gray-600">
              {{ feature.description }}
            </p>

            <!-- CTA Button -->
            <div class="pt-4 flex items-center gap-4">
              <button mat-stroked-button 
                      class="rounded-full px-8 py-3 text-base border-2 border-gray-900 text-gray-900 hover:bg-gray-900 hover:text-white transition-all duration-300">
                {{ feature.buttonText }}
                <mat-icon class="ml-2">arrow_forward</mat-icon>
              </button>
            </div>

            <!-- Navigation Arrows (Absolute positioning for cleaner look) -->
            <div class="absolute bottom-0 right-0 flex gap-3">
              <button mat-icon-button 
                      (click)="prevSlide()" 
                      [disabled]="isAnimating"
                      class="nav-btn w-12 h-12 bg-gray-200 hover:bg-gray-300 disabled:opacity-50">
                <mat-icon>arrow_back</mat-icon>
              </button>
              <button mat-icon-button 
                      (click)="nextSlide()" 
                      [disabled]="isAnimating"
                      class="nav-btn w-12 h-12 bg-gray-200 hover:bg-gray-300 disabled:opacity-50">
                <mat-icon>arrow_forward</mat-icon>
              </button>
            </div>

          </div>
        </div>
      </div>
      
    </div>
  </div>
</section>
