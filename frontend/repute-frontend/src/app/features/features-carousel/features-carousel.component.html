<section class="features-carousel-section">
  <div class="carousel-container">
    
    <!-- Carousel Content Grid -->
    <div class="carousel-grid">
      
      <!-- Left Side: Phone Mockup with Blob Background -->
      <div class="phone-side">
        <div class="blob-container">
          <div class="animated-shape-layer" aria-hidden="true">
            <span class="shape shape-one"></span>
            <span class="shape shape-two"></span>
            <span class="shape shape-three"></span>
          </div>
          <div 
            *ngFor="let feature of features; let i = index"
            class="phone-mockup-wrapper"
            [class.active]="i === currentSlide"
            [class.next]="i > currentSlide"
            [class.prev]="i < currentSlide">
            
            <!-- Phone Mockup -->
            <div class="phone-frame">
              <div class="phone-notch"></div>
              <div class="phone-content">
                <span class="placeholder-text">Phone Screen</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Side: Text Content Card -->
      <div class="content-side">
        <div class="content-card-wrapper">
          <div 
            *ngFor="let feature of features; let i = index"
            class="content-card"
            [class.active]="i === currentSlide"
            [class.next]="i > currentSlide"
            [class.prev]="i < currentSlide">
            
            <!-- Progress Indicators -->
            <div class="progress-bars">
              <div 
                *ngFor="let f of features; let idx = index"
                class="progress-bar"
                [class.active]="idx === currentSlide"
                (click)="goToSlide(idx)">
              </div>
            </div>

            <!-- Title -->
            <h3 class="card-title">{{ feature.title }}</h3>

            <!-- Description -->
            <p class="card-description">{{ feature.description }}</p>

            <!-- CTA Button -->
            <button class="cta-button">
              {{ feature.buttonText }}
              <svg class="arrow-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
              </svg>
            </button>

            <!-- Navigation Arrows -->
            <div class="nav-arrows">
              <button 
                (click)="prevSlide()"
                [disabled]="isAnimating"
                class="nav-btn"
                aria-label="Previous slide">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
              </button>
              <button 
                (click)="nextSlide()"
                [disabled]="isAnimating"
                class="nav-btn"
                aria-label="Next slide">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
              </button>
            </div>

          </div>
        </div>
      </div>
      
    </div>
  </div>
</section>
