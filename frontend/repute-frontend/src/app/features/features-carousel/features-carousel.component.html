<section class="features-carousel-section bg-gray-200 min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8 py-12">
  <div class="max-w-7xl w-full mx-auto">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-16 items-center">
      
      <!-- Left Column: Text Content -->
      <div class="text-left space-y-6">
        
        <!-- Progress Indicators -->
        <div class="flex gap-2 mb-8">
          <div 
            *ngFor="let feature of features; let i = index"
            class="h-1 rounded-full transition-all duration-500 cursor-pointer"
            [class.bg-gray-800]="i === currentSlide"
            [class.bg-gray-400]="i !== currentSlide"
            [style.width]="i === currentSlide ? '80px' : '40px'"
            (click)="goToSlide(i)">
          </div>
        </div>

        <!-- Content that changes with slides -->
        <div class="relative overflow-hidden">
          <div 
            *ngFor="let feature of features; let i = index"
            class="transition-all duration-700 ease-in-out"
            [class.opacity-100]="i === currentSlide"
            [class.opacity-0]="i !== currentSlide"
            [class.translate-x-0]="i === currentSlide"
            [class.translate-x-full]="i > currentSlide"
            [class.-translate-x-full]="i < currentSlide"
            [style.display]="i === currentSlide ? 'block' : 'none'">
            
            <!-- Badge and Title -->
            <div class="flex items-center gap-3 mb-6">
              <span [class]="feature.badgeColor + ' text-gray-900 text-sm font-semibold px-4 py-1 rounded-md'">
                {{ feature.badge }}
              </span>
              <span class="text-gray-700 text-base font-normal">{{ feature.title }}</span>
            </div>

            <!-- Main Heading -->
            <h2 class="text-4xl sm:text-5xl lg:text-6xl font-bold text-gray-900 leading-tight mb-2">
              {{ feature.heading }}
            </h2>
            <h3 class="text-4xl sm:text-5xl lg:text-6xl font-bold text-gray-900 leading-tight mb-8">
              {{ feature.subheading }}
            </h3>

            <!-- Description -->
            <p class="text-base sm:text-lg text-gray-700 max-w-lg leading-relaxed mb-8">
              {{ feature.description }}
            </p>

            <!-- Price -->
            <p class="text-lg text-gray-900 font-normal mb-8">
              {{ feature.price }}
            </p>

            <!-- CTA Button -->
            <button class="bg-gray-900 text-white px-8 py-4 rounded-full text-base font-medium hover:bg-gray-800 transition-all duration-300 flex items-center gap-2 group">
              {{ feature.buttonText }}
              <svg class="w-5 h-5 transition-transform duration-300 group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" stroke="lime"></path>
              </svg>
            </button>
          </div>
        </div>

        <!-- Navigation Arrows -->
        <div class="flex gap-4 mt-12">
          <button 
            (click)="prevSlide()"
            class="w-14 h-14 rounded-full border-2 border-gray-400 flex items-center justify-center hover:border-gray-900 hover:bg-gray-100 transition-all duration-300">
            <svg class="w-6 h-6 text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
          </button>
          <button 
            (click)="nextSlide()"
            class="w-14 h-14 rounded-full border-2 border-gray-400 flex items-center justify-center hover:border-gray-900 hover:bg-gray-100 transition-all duration-300">
            <svg class="w-6 h-6 text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
          </button>
        </div>

      </div>

      <!-- Right Column: Image/Product Container -->
      <div class="flex items-center justify-center lg:justify-end">
        <div 
          class="relative w-full max-w-[600px] aspect-[4/3] rounded-[40px] bg-gray-900 shadow-2xl overflow-hidden"
          (mouseenter)="pauseAutoPlay()"
          (mouseleave)="resumeAutoPlay()">
          
          <!-- Empty container for your content (watch image, etc.) -->
          <div class="w-full h-full flex items-center justify-center text-gray-500">
            <!-- Add your image or content here -->
          </div>

          <!-- Pause/Play Button (bottom right) -->
          <button 
            class="absolute bottom-6 right-6 w-12 h-12 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 flex items-center justify-center hover:bg-white/30 transition-all duration-300">
            <svg *ngIf="!isPaused" class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
              <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"></path>
            </svg>
            <svg *ngIf="isPaused" class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"></path>
            </svg>
          </button>
        </div>
      </div>
      
    </div>
  </div>
</section>
