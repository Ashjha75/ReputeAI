<section class="hero-section bg-white min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8">
  <div class="max-w-7xl w-full mx-auto">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-16 items-center">
      
      <!-- Left Column: Text Content -->
      <div class="text-left space-y-6 fade-in-left">
        <h1 class="text-4xl sm:text-5xl lg:text-6xl xl:text-7xl font-bold text-gray-900 leading-tight tracking-tight">
          Switch to a<br />
          phone that<br />
          feels like you.
        </h1>
        <p class="text-base sm:text-lg text-gray-600 max-w-lg leading-relaxed">
          Your favourite apps, photos, chats, and more come too,<br />
          with Android Switch.<sup>1</sup>
        </p>
      </div>

      <!-- Right Column: Gradient Card with Play Button -->
      <div class="flex items-center justify-center lg:justify-end fade-in-right">
        <div class="relative w-full max-w-[500px] aspect-square rounded-[60px] bg-gradient-to-br from-green-200 via-cyan-200 to-blue-300 shadow-2xl overflow-hidden">
          <!-- Dummy text placeholder instead of play icon -->
          <div class="absolute bottom-8 right-8 w-14 h-14 rounded-full bg-white/90 backdrop-blur-sm border border-gray-300 shadow-lg flex items-center justify-center text-xs text-gray-700 font-medium hover:bg-white hover:scale-105 transition-all duration-300 cursor-pointer"
               (click)="openConfirmModal()">
            <span class="material-icons text-3xl text-blue-400 animate-pulse">play_circle</span>
          </div>
        </div>
      </div>
      
    </div>
  </div>

  <!-- Feature Modal Instance -->
  <app-feature-modal
    #featureModal
    [badgeLabel]="featureModalData.badgeLabel"
    [badgeContext]="featureModalData.badgeContext"
    [title]="featureModalData.title"
    [subtitle]="featureModalData.subtitle"
    [description]="featureModalData.description"
    [ctaLabel]="featureModalData.ctaLabel"
    [ctaIcon]="featureModalData.ctaIcon"
    [mediaSrc]="featureModalData.mediaSrc"
    [mediaAlt]="featureModalData.mediaAlt"
    (cta)="handleFeatureCta()"
    (close)="closeFeatureModal()">
  </app-feature-modal>

  <!-- Confirm Modal Instance -->
  <app-confirm-modal
    #confirmModal
    [config]="confirmConfig"
    (close)="closeConfirmModal()"
    (confirm)="confirmAction()">
  </app-confirm-modal>
</section>
