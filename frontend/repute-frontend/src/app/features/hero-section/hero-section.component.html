<section class="hero-section flex items-center justify-center min-h-screen bg-slate-50">
  <div class="card-carousel relative w-full flex items-center justify-center">
    <div *ngFor="let card of coolCards; let i = index"
         class="cool-card absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"
         [ngClass]="{ 'active': i === currentCardIndex, 'inactive': i !== currentCardIndex }"
         [style.background]="card.color"
         [style.opacity]="i === currentCardIndex ? '1' : '0'"
         [style.zIndex]="i === currentCardIndex ? '10' : '1'">
      <div class="card-content flex flex-col items-center justify-center p-10 rounded-3xl shadow-xl w-[350px] h-[420px]">
        <span class="material-icons text-6xl mb-6 text-slate-700">{{ card.icon }}</span>
        <h2 class="text-2xl font-bold text-slate-900 mb-2">{{ card.title }}</h2>
        <h3 class="text-lg text-violet-600 font-semibold mb-4">{{ card.subtitle }}</h3>
        <p class="text-base text-slate-500 text-center">{{ card.description }}</p>
      </div>
    </div>
  </div>
</section>
