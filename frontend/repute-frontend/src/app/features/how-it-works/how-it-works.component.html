<section class="how-it-works-section">
  <div class="header-sticky-wrapper">
    <div class="header-content">
      <div class="badge-pill">HOW IT WORKS</div>
      <h2 class="section-title">Get Started with ReputeAI</h2>
      <p class="section-subtitle">Simple steps to transform your online reputation</p>
    </div>
  </div>

  <div class="cards-stack-container">
    <div class="card-wrapper" *ngFor="let step of steps; let i = index" [style.--index]="i">
      <div class="card" [ngClass]="'card-' + (i + 1)">
        <div class="card-content">
          <div class="step-indicator">
            <span class="step-number">0{{ step.number }}</span>
            <div class="step-line"></div>
          </div>
          
          <div class="text-content">
            <h3 class="card-title">{{ step.title }}</h3>
            <p class="card-description">{{ step.description }}</p>
          </div>

          <div class="card-visual">
            <div class="icon-circle">
              <mat-icon>{{ step.icon }}</mat-icon>
            </div>
            <div class="visual-decoration"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CTA Button -->
  <div class="cta-container">
    <button class="get-started-btn">
      Get Started Now
      <mat-icon>arrow_forward</mat-icon>
    </button>
    <p class="cta-subtext">No credit card required • Free 14-day trial</p>
  </div>
</section>
