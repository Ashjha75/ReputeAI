<section class="how-it-works-section py-20 px-4 sm:px-6 lg:px-8">
  <div class="max-w-5xl mx-auto">
    
    <!-- Section Header -->
    <div class="text-center mb-16">
      <div class="inline-flex items-center justify-center px-5 py-2 bg-gray-900 rounded-full mb-6">
        <span class="text-white font-medium text-sm tracking-wide">HOW IT WORKS</span>
      </div>
      <h2 class="text-4xl md:text-5xl font-bold text-gray-900 mb-4">
        Get Started with ReputeAI
      </h2>
      <p class="text-lg text-gray-600 max-w-2xl mx-auto">
        Simple steps to transform your online reputation
      </p>
    </div>

    <!-- Steps List -->
    <div class="space-y-12">
      <div *ngFor="let step of steps; let i = index" 
           class="step-item">
        
        <!-- Step Card -->
        <div class="bg-white rounded-3xl p-8 md:p-10 shadow-lg hover:shadow-xl transition-shadow duration-300">
          <div class="flex flex-col md:flex-row gap-8 items-center">
            
            <!-- Phone Mockup (Left Side) -->
            <div class="flex-shrink-0">
              <div class="phone-mockup bg-gray-900 rounded-3xl p-4 w-48 h-96 flex items-center justify-center shadow-2xl">
                <div class="text-center text-white space-y-4">
                  <mat-icon class="text-6xl opacity-80">{{ step.icon }}</mat-icon>
                  <div class="text-xs opacity-60">Step {{ step.number }}</div>
                </div>
              </div>
            </div>

            <!-- Step Content (Right Side) -->
            <div class="flex-grow">
              <div class="flex items-center gap-4 mb-4">
                <div class="flex-shrink-0 w-12 h-12 rounded-xl bg-gray-900 flex items-center justify-center">
                  <span class="text-white font-bold text-lg">{{ step.number }}</span>
                </div>
                <h3 class="text-2xl md:text-3xl font-bold text-gray-900">
                  {{ step.title }}
                </h3>
              </div>
              <p class="text-gray-600 leading-relaxed text-base md:text-lg">
                {{ step.description }}
              </p>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- CTA Button -->
    <div class="text-center mt-16">
      <button class="get-started-btn px-10 py-4 bg-gray-900 text-white font-semibold text-lg rounded-full shadow-xl hover:shadow-2xl transform hover:scale-105 transition-all duration-300">
        Get Started Now
      </button>
      <p class="mt-4 text-gray-500 text-sm">No credit card required • Free 14-day trial</p>
    </div>

  </div>
</section>
