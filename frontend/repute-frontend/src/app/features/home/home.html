
<!-- CTA Banner Section -->


<!-- Hero Section Component Host -->
<app-hero-section></app-hero-section>

<!-- Features Carousel Section -->
<app-features-carousel></app-features-carousel>

<!-- How It Works Section -->
<app-how-it-works></app-how-it-works>

<!-- Feature Grid Section -->
<app-feature-grid></app-feature-grid>

<!-- Support FAQ Section -->
<app-support-faq></app-support-faq>


<!-- Spotlight Feature Cards Section -->
<section class="feature-highlights-section fade-in-card">
	<div class="feature-highlights-grid">
		<app-feature-highlight-card
			*ngFor="let card of featureHighlights"
			[card]="card"
			(action)="handleCardAction($event)"
		></app-feature-highlight-card>
	</div>
</section>
<div class="cta-banner-wrapper">
	<div class="cta-banner-card">
		<app-cta-banner icon="campaign" iconColor="#1976d2">
			<span cta-message>
				Get news, offers, cart reminders, personalised emails, and surveys from the Google Store.
			</span>
			<span cta-action>
				Sign up
			</span>
		</app-cta-banner>
	</div>
</div>
<!-- Pixel Drop Promo Section -->
<app-pixel-drop-promo></app-pixel-drop-promo>

<!-- Footer -->
<app-footer></app-footer>
